<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn Custom Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-radius: 12px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .dashboard {
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .navbar {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--border-radius);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand h1 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 0.5px;
        }

        /* Klikbaar gemaakt om admin panel te openen */
        .status {
            font-size: 13px;
            color: var(--accent-color);
            margin-top: 4px;
            cursor: pointer;
            user-select: none;
        }
        .status:hover {
            text-decoration: underline;
        }

        .stats-badge {
            background: linear-gradient(135deg, #334155, #1e293b);
            border: 1px solid var(--accent-color);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .panel {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .panel-header {
            margin-bottom: 20px;
        }

        .panel h2 {
            margin: 0 0 5px 0;
            font-size: 18px;
        }

        .panel p {
            margin: 0;
            color: var(--text-muted);
            font-size: 13px;
        }

        .input-group {
            margin-bottom: 20px;
        }
